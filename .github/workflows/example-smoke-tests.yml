name: Example smoke tests

on:
  pull_request:
    branches:
      - 'main'
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-snapshot:
    runs-on: ubuntu-latest
    name: Publish snapshot to Maven local

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: oracle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish current snapshot to Maven local
        run: ./gradlew publishToMavenLocal -x test --no-daemon

      - name: Pack Namastack Maven local artifacts
        run: tar -czf namastack-maven-local.tgz -C ~/.m2/repository io/namastack

      - name: Upload Namastack Maven local artifacts
        uses: actions/upload-artifact@v7
        with:
          name: namastack-maven-local
          path: namastack-maven-local.tgz
          if-no-files-found: error

  example-smoke-tests:
    runs-on: ubuntu-latest
    needs: publish-snapshot
    name: ${{ matrix.example }}
    strategy:
      fail-fast: false
      matrix:
        example:
          - namastack-outbox-example-annotation
          - namastack-outbox-example-fallback
          - namastack-outbox-example-flyway-jdbc
          - namastack-outbox-example-flyway-jpa
          - namastack-outbox-example-h2
          - namastack-outbox-example-java
          - namastack-outbox-example-jdbc
          - namastack-outbox-example-kafka
          - namastack-outbox-example-kafka-java
          - namastack-outbox-example-mariadb
          - namastack-outbox-example-mongodb
          - namastack-outbox-example-multicaster
          - namastack-outbox-example-mysql
          - namastack-outbox-example-postgresql
          - namastack-outbox-example-rabbit
          - namastack-outbox-example-rabbit-java
          - namastack-outbox-example-retry
          - namastack-outbox-example-sns
          - namastack-outbox-example-sns-java
          - namastack-outbox-example-sqlserver
          - namastack-outbox-example-table-prefix-jdbc
          - namastack-outbox-example-table-prefix-jpa
          - namastack-outbox-example-tracing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: oracle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Download Namastack Maven local artifacts
        uses: actions/download-artifact@v7
        with:
          name: namastack-maven-local

      - name: Restore Namastack Maven local artifacts
        run: |
          mkdir -p ~/.m2/repository
          tar -xzf namastack-maven-local.tgz -C ~/.m2/repository

      - name: Run example smoke test
        working-directory: namastack-outbox-examples/${{ matrix.example }}
        run: ./gradlew test --no-daemon --refresh-dependencies
