spring:
  application:
    name: namastack-outbox-example-modulith

  datasource:
    url: jdbc:h2:mem:modulith-demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop

  modulith:
    events:
      externalization:
        mode: outbox

namastack:
  outbox:
    retry:
      policy: fixed
      fixed:
        delay: 5000
      exclude-exceptions:
        - java.lang.RuntimeException

logging:
  level:
    root: warn
    io.namastack: trace
    org.springframework.modulith.events.kafka: debug
