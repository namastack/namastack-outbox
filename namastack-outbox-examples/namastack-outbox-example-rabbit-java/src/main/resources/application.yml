spring:
  application:
    name: namastack-outbox-example-rabbit-java

  datasource:
    url: jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-returns: true
    template:
      mandatory: true
    publisher-confirm-type: correlated

namastack:
  outbox:
    rabbit:
      publisher-confirm-timeout: 2s
      fail-on-unroutable: true

logging:
  level:
    root: warn
    io.namastack: debug
