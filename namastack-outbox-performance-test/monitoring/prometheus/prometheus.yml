global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: outbox-consumer
    metrics_path: /actuator/prometheus
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/consumer-targets.json
        refresh_interval: 1s

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

